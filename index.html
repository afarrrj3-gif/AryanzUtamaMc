<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rekber MC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PAGE 1: HOME -->
<div id="page-home" class="page active-page">
    <!-- Banner -->
    <div class="banner-wrap">
        <img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766772767/IMG-20251128-WA0091_ldbe9l.jpg" class="banner-img">
        <div class="banner-dark"></div>
        <div class="banner-text">
            <h1>Rekber MC</h1>
            <p>Transaksi Aman & Terpercaya</p>
        </div>
    </div>

    <div class="home-body">
        <!-- Profile -->
        <div class="profile-box">
            <img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766845910/IMG-20251128-WA0094_1_rrrhdn.jpg" class="prof-ava">
            <div class="prof-info">
                <h2>AryanzUtama</h2>
                <span class="verif-badge">✓ Verified</span>
            </div>
        </div>

        <!-- Menu -->
        <div class="menu-box">
            <p class="menu-label">Pilih Peran</p>
            
            <button class="menu-item buyer" onclick="goBuyer()">
                <div class="item-icon">🛒</div>
                <div class="item-text">
                    <b>Buyer</b>
                    <span>Pembeli</span>
                </div>
                <div class="item-arrow">›</div>
            </button>

            <button class="menu-item seller" onclick="goSeller()">
                <div class="item-icon">🏪</div>
                <div class="item-text">
                    <b>Seller</b>
                    <span>Penjual</span>
                </div>
                <div class="item-arrow">›</div>
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-box">
            <div class="stat">
                <b>100%</b>
                <span>Aman</span>
            </div>
            <div class="stat-line"></div>
            <div class="stat">
                <b>24/7</b>
                <span>Support</span>
            </div>
            <div class="stat-line"></div>
            <div class="stat">
                <b>0%</b>
                <span>Fee</span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="powered" onclick="openAdmin()">
        PoweredByAryanzUtama
    </div>
</div>

<!-- PAGE 2: BUYER FORM -->
<div id="page-buyer" class="page">
    <div class="nav-bar">
        <button onclick="goHome()" class="nav-btn">‹ Back</button>
        <span>Buyer</span>
    </div>

    <div class="form-wrap">
        <div class="form-head">
            <div class="form-icon">🛒</div>
            <h2>Masuk sebagai Buyer</h2>
        </div>

        <div class="input-box">
            <label>Nama</label>
            <input type="text" id="b-name" placeholder="Nama lengkap">
        </div>

        <div class="input-box">
            <label>WhatsApp</label>
            <input type="tel" id="b-wa" placeholder="08xxxxxxxxxx">
        </div>

        <div class="input-box">
            <label>Kode Room</label>
            <input type="number" id="b-code" placeholder="6 digit" oninput="checkBuyer()">
        </div>

        <button id="btn-b" class="main-btn" onclick="joinBuyer()" disabled>
            Masuk Room
        </button>
    </div>
</div>

<!-- PAGE 3: SELLER FORM -->
<div id="page-seller" class="page">
    <div class="nav-bar">
        <button onclick="goHome()" class="nav-btn">‹ Back</button>
        <span>Seller</span>
    </div>

    <div class="form-wrap seller-bg">
        <div class="form-head">
            <div class="form-icon">🏪</div>
            <h2>Buat Room Baru</h2>
        </div>

        <div class="input-box">
            <label>Nama</label>
            <input type="text" id="s-name" placeholder="Nama seller">
        </div>

        <div class="input-box">
            <label>Nominal</label>
            <input type="text" id="s-nom" placeholder="50000" onkeyup="formatUang()">
            <div class="uang-text" id="uang">Rp0</div>
        </div>

        <div class="input-box">
            <label>Tipe</label>
            <div class="type-btns">
                <button onclick="setTipe('inc')" id="t-inc" class="t-btn">INC</button>
                <button onclick="setTipe('exc')" id="t-exc" class="t-btn">EXC</button>
            </div>
        </div>

        <div class="input-box">
            <label>WhatsApp</label>
            <input type="tel" id="s-wa" placeholder="08xxxxxxxxxx" oninput="checkSeller()">
        </div>

        <button id="btn-s" class="main-btn green" onclick="buatRoom()" disabled>
            Buat Room
        </button>

        <div id="hasil-room" class="hasil-box" style="display:none;">
            <div class="kode-label">ROOM CODE</div>
            <div class="kode-angka" id="kode">000000</div>
            <button class="copy-btn" onclick="salinKode()">📋 Salin</button>
            <button class="main-btn" onclick="masukSeller()">Masuk Room</button>
        </div>
    </div>
</div>

<!-- PAGE 4: ADMIN LOGIN -->
<div id="page-admin" class="page admin-bg">
    <div class="admin-modal">
        <div class="adm-icon">🔐</div>
        <h3>Admin Access</h3>
        <input type="password" id="adm-pass" placeholder="Password">
        <button class="main-btn" onclick="cekAdmin()">Masuk</button>
        <button class="batal-btn" onclick="goHome()">Batal</button>
    </div>
</div>

<!-- PAGE 5: CHAT -->
<div id="page-chat" class="page">
    <!-- Header -->
    <div class="chat-head">
        <button onclick="goHome()" class="back-chat">‹</button>
        <img src="https://res.cloudinary.com/dtdodhqqi/image/upload/v1766845910/IMG-20251128-WA0094_1_rrrhdn.jpg" class="chat-ava">
        <div class="chat-info">
            <span id="chat-nom">Rp0</span>
            <span id="chat-tipe" class="tipe-badge">INC</span>
        </div>
        <button class="menu-chat" onclick="infoRoom()">•••</button>
    </div>

    <!-- Messages -->
    <div class="chat-bg" onclick="tutupMenu()">
        <div id="chat-msgs" class="msg-list"></div>
    </div>

    <!-- Input -->
    <div class="input-float">
        <div class="blur-bg"></div>
        <div class="input-row">
            <button class="btn-clip" onclick="document.getElementById('file-in').click()">📎</button>
            <input type="file" id="file-in" hidden accept="image/*" onchange="kirimGambar(this)">
            
            <div class="input-only">
                <input type="text" id="msg-in" placeholder="Pesan" onkeypress="if(event.key==='Enter')kirimPesan()">
            </div>
            
            <button class="btn-kirim" onclick="kirimPesan()">➤</button>
        </div>
    </div>
</div>

<!-- CONTEXT MENU (Hidden by default) -->
<div id="ctx-menu" class="ctx-menu" style="display:none;">
    <div class="ctx-back" onclick="tutupMenu()"></div>
    <div class="ctx-box">
        <button onclick="editPesan()">✏️ Edit</button>
        <button onclick="hapusPesan()" class="red">🗑 Hapus</button>
        <div class="ctx-line"></div>
        <button onclick="tutupMenu()">Batal</button>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    // Config
    const firebaseConfig = {
        apiKey: "AIzaSyDpQhIcitZwMMhQIHhpB9rp_k0EpBJT-2k",
        authDomain: "chat-real-time-32576.firebaseapp.com",
        databaseURL: "https://chat-real-time-32576-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chat-real-time-32576",
        storageBucket: "chat-real-time-32576.appspot.com",
        messagingSenderId: "21431357525",
        appId: "1:21431357525:web:5a32eb1ae3f59a485e04dc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    
    const BOT_TOKEN = "8672339759:AAF_jy2iB5xZlHh6843s-8RkukvJ5-yROto";
    const CHAT_ID = "7129085772";
    
    let role = '', nama = '', room = '', tipe = '', nominal = '', msgIdSelect = null;
    let tekanLama;

    // Navigation
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => {
            p.style.display = 'none';
            p.classList.remove('active-page');
        });
        const el = document.getElementById('page-' + id);
        el.style.display = 'block';
        setTimeout(() => el.classList.add('active-page'), 10);
    }

    function goHome() { showPage('home'); }
    function goBuyer() { showPage('buyer'); }
    function goSeller() { showPage('seller'); }
    function openAdmin() { showPage('admin'); }

    // Format Uang
    function formatUang() {
        let v = document.getElementById('s-nom').value.replace(/\D/g, '');
        document.getElementById('s-nom').value = v;
        document.getElementById('uang').textContent = v ? 
            'Rp' + parseInt(v).toLocaleString('id-ID') : 'Rp0';
        checkSeller();
    }

    function setTipe(t) {
        tipe = t;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('aktif'));
        document.getElementById('t-' + t).classList.add('aktif');
        checkSeller();
    }

    function checkBuyer() {
        let n = document.getElementById('b-name').value;
        let w = document.getElementById('b-wa').value;
        let c = document.getElementById('b-code').value;
        document.getElementById('btn-b').disabled = !(n && w && c.length === 6);
    }

    function checkSeller() {
        let n = document.getElementById('s-name').value;
        let m = document.getElementById('s-nom').value;
        let w = document.getElementById('s-wa').value;
        document.getElementById('btn-s').disabled = !(n && m && w && tipe);
    }

    // Buat Room
    function buatRoom() {
        nama = document.getElementById('s-name').value;
        nominal = document.getElementById('uang').textContent;
        room = String(Math.floor(100000 + Math.random() * 900000));
        
        document.getElementById('kode').textContent = room;
        document.getElementById('hasil-room').style.display = 'block';
        
        db.ref('rooms/' + room).set({
            info: { nominal, tipe, seller: nama, wa: document.getElementById('s-wa').value }
        });

        // Telegram
        let now = new Date();
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: `🏪 SELLER\n${nama}\n${nominal}\n${tipe}\nRoom:${room}\n${now.toLocaleString('id-ID')}`
            })
        });
    }

    function salinKode() {
        navigator.clipboard.writeText(room);
        alert('Disalin: ' + room);
    }

    // Join
    function joinBuyer() {
        nama = document.getElementById('b-name').value;
        room = document.getElementById('b-code').value;
        
        db.ref('rooms/' + room).once('value', s => {
            if(s.exists()) {
                let i = s.val().info;
                nominal = i.nominal;
                tipe = i.tipe;
                
                db.ref('rooms/' + room + '/buyer').set({
                    name: nama,
                    wa: document.getElementById('b-wa').value
                });
                
                masukChat('buyer');
                
                let now = new Date();
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: `🛒 BUYER\n${nama}\nRoom:${room}\n${now.toLocaleString('id-ID')}`
                    })
                });
            } else alert('Room tidak ada!');
        });
    }

    function masukSeller() {
        masukChat('seller');
    }

    function masukChat(r) {
        role = r;
        showPage('chat');
        
        document.getElementById('chat-nom').textContent = nominal;
        document.getElementById('chat-tipe').textContent = tipe;
        
        let ref = db.ref('rooms/' + room + '/messages');
        document.getElementById('chat-msgs').innerHTML = '';
        
        ref.on('child_added', s => {
            tampilPesan(s.key, s.val());
        });

        if(r === 'seller') {
            setTimeout(() => {
                ref.push({
                    dari: 'Admin MC',
                    text: `Halo ${nama}! 👋\n\nSaya Admin MC.\n💰 ${nominal}\n📌 ${tipe}\n🔑 ${room}`,
                    waktu: new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),
                    tipe: 'text'
                });
            }, 500);
        }
    }

    function tampilPesan(key, m) {
        let div = document.createElement('div');
        div.className = 'bubble ' + (m.dari === nama ? 'out' : 'in');
        div.dataset.id = key;
        
        // Long press
        div.onmousedown = () => { tekanLama = setTimeout(()=>bukaMenu(key),600); };
        div.onmouseup = () => clearTimeout(tekanLama);
        div.ontouchstart = () => { tekanLama = setTimeout(()=>bukaMenu(key),600); };
        div.ontouchend = () => clearTimeout(tekanLama);
        
        let w = m.waktu || new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
        let c = m.dari === nama ? '<i>✓✓</i>' : '';
        
        if(m.tipe === 'img') {
            div.innerHTML = `<img src="${m.url}" class="chat-img" onclick="window.open('${m.url}')">`;
        } else {
            div.innerHTML = `
                ${m.dari !== nama ? `<div class="pengirim">${m.dari}</div>` : ''}
                <div class="isi">${m.text}</div>
                <div class="waktu">${w} ${c}</div>
            `;
        }
        
        document.getElementById('chat-msgs').appendChild(div);
        document.getElementById('chat-msgs').scrollTop = 99999;
    }

    // Context Menu
    function bukaMenu(id) {
        msgIdSelect = id;
        document.getElementById('ctx-menu').style.display = 'block';
    }

    function tutupMenu() {
        document.getElementById('ctx-menu').style.display = 'none';
        msgIdSelect = null;
    }

    function hapusPesan() {
        if(!msgIdSelect) return;
        let el = document.querySelector(`[data-id="${msgIdSelect}"]`);
        el.style.transform = 'translateX(100%)';
        el.style.opacity = '0';
        
        setTimeout(() => {
            db.ref('rooms/' + room + '/messages/' + msgIdSelect).update({hapus:true});
            el.className = 'bubble system';
            el.innerHTML = '<div class="hapus-text">🗑 Pesan dihapus</div>';
            el.style.transform = 'translateX(0)';
            el.style.opacity = '1';
        }, 300);
        
        tutupMenu();
    }

    function editPesan() {
        tutupMenu();
        // Edit implementation
    }

    // Kirim
    function kirimPesan() {
        let inp = document.getElementById('msg-in');
        let txt = inp.value.trim();
        if(!txt) return;
        
        db.ref('rooms/' + room + '/messages').push({
            dari: nama,
            text: txt,
            waktu: new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),
            tipe: 'text'
        });
        
        inp.value = '';
    }

    function kirimGambar(input) {
        let file = input.files[0];
        if(!file) return;
        
        let ref = storage.ref('img/' + Date.now() + '.jpg');
        ref.put(file).then(() => {
            ref.getDownloadURL().then(url => {
                db.ref('rooms/' + room + '/messages').push({
                    dari: nama,
                    url: url,
                    tipe: 'img',
                    waktu: new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})
                });
            });
        });
    }

    // Admin
    function cekAdmin() {
        if(document.getElementById('adm-pass').value === 'khansa') {
            alert('Admin mode!');
            goHome();
        } else {
            alert('Salah!');
        }
    }

    function infoRoom() {
        alert(`Room: ${room}\nNominal: ${nominal}\nTipe: ${tipe}`);
    }

    // Init
    showPage('home');
</script>

</body>
    </html>
