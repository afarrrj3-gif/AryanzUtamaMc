<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Step 1</title>
    <style>
        /* Styling sementara supaya kelihatan rapi */
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .hidden { display: none; }
        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
        }
        #chat-box {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin: 10px 0;
        }
        .message {
            background: #f0f0f0;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- HALAMAN LOGIN -->
    <div id="login-page">
        <h2>Masuk ke Chat Room</h2>
        <input type="text" id="username" placeholder="Nama Anda">
        <input type="text" id="room-code" placeholder="Kode Room (contoh: ABC123)">
        <button onclick="joinRoom()">Gabung</button>
        <button onclick="createRoom()">Buat Room Baru</button>
        
        <div id="new-code-info" class="hidden" style="margin-top: 20px; padding: 10px; background: #e0f7fa;">
            <p>Room baru dibuat! Kode: <strong id="generated-code"></strong></p>
            <button onclick="showChat()">Masuk ke Room</button>
        </div>
    </div>

    <!-- HALAMAN CHAT -->
    <div id="chat-page" class="hidden">
        <h3>Room: <span id="current-room"></span></h3>
        <div id="chat-box">
            <!-- Pesan akan muncul di sini -->
        </div>
        <input type="text" id="message-input" placeholder="Tulis pesan...">
        <button onclick="sendMessage()">Kirim</button>
    </div>

    <script>
        // VARIABEL PENYIMPANAN SEMENTARA
        let username = '';
        let roomCode = '';

        function createRoom() {
            // Generate kode random 6 huruf
            roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('generated-code').textContent = roomCode;
            document.getElementById('new-code-info').classList.remove('hidden');
        }

        function joinRoom() {
            username = document.getElementById('username').value;
            roomCode = document.getElementById('room-code').value.toUpperCase();
            
            if (!username || !roomCode) {
                alert('Nama dan kode room wajib diisi!');
                return;
            }
            
            showChat();
        }

        function showChat() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('chat-page').classList.remove('hidden');
            document.getElementById('current-room').textContent = roomCode;
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value;
            
            if (message) {
                // Tambah pesan ke chat box (sementara)
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML += `<div class="message"><strong>${username}:</strong> ${message}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight; // Scroll ke bawah
                input.value = '';
            }
        }
    </script>

</body>
</html>
