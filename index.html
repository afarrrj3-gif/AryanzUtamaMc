<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login Page -->
<div id="login-page">
    <div class="login-box">
        <div class="logo">💬</div>
        <h1>Telegram Clone</h1>
        <p class="subtitle">Room Code (6 Digit Angka)</p>
        
        <input type="text" id="username" placeholder="Nama Anda" maxlength="20" autocomplete="off">
        <input type="number" id="room-input" placeholder="Contoh: 009898" maxlength="6" autocomplete="off">
        
        <button class="btn-primary" onclick="joinRoom()">Gabung ke Room</button>
        <button class="btn-secondary" onclick="createRoom()">Buat Room Baru</button>
        
        <div id="new-room-display" class="room-display hidden">
            <div class="room-label">Room Code Anda:</div>
            <div class="room-code" id="generated-code"></div>
            <button class="btn-primary" onclick="enterRoom()" style="margin-top: 15px;">Masuk Room</button>
        </div>
    </div>
</div>

<!-- Chat Page -->
<div id="chat-page" class="hidden">
    <div class="chat-header">
        <button class="back-btn" onclick="leaveRoom()">‹</button>
        <div class="header-info">
            <div class="header-title" id="current-room">Room</div>
            <div class="header-status">online</div>
        </div>
    </div>
    
    <div id="messages" class="messages-container">
        <!-- Messages will appear here -->
    </div>
    
    <div class="input-area">
        <input type="text" id="message-input" placeholder="Pesan" maxlength="200" autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDpQhIcitZwMMhQIHhpB9rp_k0EpBJT-2k",
        authDomain: "chat-real-time-32576.firebaseapp.com",
        databaseURL: "https://chat-real-time-32576-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "chat-real-time-32576",
        storageBucket: "chat-real-time-32576.appspot.com",
        messagingSenderId: "21431357525",
        appId: "1:21431357525:web:5a32eb1ae3f59a485e04dc"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let currentRoom = '';
    let username = '';
    let roomRef = null;
    let lastDate = null;
    
    // GANTI DENGAN DATA ANDA
    const BOT_TOKEN = "8672339759:AAF_jy2iB5xZlHh6843s-8RkukvJ5-yROto";
    const CHAT_ID = "7129085772";
    
    // Hanya notif saat user join (tidak untuk setiap chat)
    function sendTelegramNotif(user, room) {
        const text = `🚪 <b>${user}</b> masuk ke room <code>${room}</code>\n\n⏰ ${new Date().toLocaleString('id-ID')}`;
        
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: text,
                parse_mode: 'HTML'
            })
        }).catch(e => console.log('Telegram error'));
    }
    
    function createRoom() {
        const nameInput = document.getElementById('username').value.trim();
        if (!nameInput) {
            alert('Isi nama dulu!');
            return;
        }
        generatedRoomCode = String(Math.floor(100000 + Math.random() * 900000));
        document.getElementById('generated-code').textContent = generatedRoomCode;
        document.getElementById('new-room-display').classList.remove('hidden');
    }
    
    function enterRoom() {
        document.getElementById('room-input').value = generatedRoomCode;
        joinRoom();
    }
    
    function joinRoom() {
        username = document.getElementById('username').value.trim();
        currentRoom = document.getElementById('room-input').value.trim();
        
        if (!username) {
            alert('Nama wajib diisi!');
            return;
        }
        if (!currentRoom || currentRoom.length !== 6 || isNaN(currentRoom)) {
            alert('Room code harus 6 digit angka!');
            return;
        }
        
        localStorage.setItem('chat_username', username);
        localStorage.setItem('chat_room', currentRoom);
        lastDate = null;
        
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('chat-page').classList.remove('hidden');
        document.getElementById('current-room').textContent = currentRoom;
        
        roomRef = database.ref('rooms/' + currentRoom);
        
        // Listen new messages
        roomRef.on('child_added', (snapshot) => {
            const msg = snapshot.val();
            const key = snapshot.key;
            displayMessage(msg, key);
            
            // Mark as read if incoming message
            if (msg.type === 'message' && msg.username !== username && !msg.read) {
                snapshot.ref.update({ read: true });
            }
        });
        
        // Listen for read status changes (for checkmarks)
        roomRef.on('child_changed', (snapshot) => {
            const msg = snapshot.val();
            const key = snapshot.key;
            updateReadStatus(key, msg.read);
        });
        
        // Send join message
        roomRef.push({
            type: 'system',
            text: `${username} bergabung`,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        
        // Kirim notif Telegram (hanya sekali saat join)
        sendTelegramNotif(username, currentRoom);
        
        document.getElementById('message-input').focus();
    }
    
    function displayMessage(msg, key) {
        const container = document.getElementById('messages');
        const date = new Date(msg.timestamp);
        const dateStr = date.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
        
        // Add date separator if new day
        if (dateStr !== lastDate) {
            lastDate = dateStr;
            const dateDiv = document.createElement('div');
            dateDiv.className = 'date-separator';
            dateDiv.innerHTML = `<span>${dateStr}</span>`;
            container.appendChild(dateDiv);
        }
        
        if (msg.type === 'system') {
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = msg.text;
            container.appendChild(div);
        } else {
            const isMe = msg.username === username;
            const div = document.createElement('div');
            div.className = `message ${isMe ? 'outgoing' : 'incoming'}`;
            div.id = 'msg-' + key;
            
            const time = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            // Checkmarks: grey if not read, blue if read (only for me)
            let checkmarks = '';
            if (isMe) {
                const checkColor = msg.read ? '#4fc3f7' : '#9e9e9e';
                checkmarks = `<span class="checkmarks" style="color:${checkColor}">✓✓</span>`;
            }
            
            div.innerHTML = `
                <div class="message-content">
                    ${!isMe ? `<div class="message-name">${msg.username}</div>` : ''}
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-meta">
                        <span class="message-time">${time}</span>
                        ${checkmarks}
                    </div>
                </div>
            `;
            
            container.appendChild(div);
            
            // Smooth scroll to bottom
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 100);
        }
    }
    
    function updateReadStatus(key, isRead) {
        const msgEl = document.getElementById('msg-' + key);
        if (msgEl) {
            const checkmarks = msgEl.querySelector('.checkmarks');
            if (checkmarks && isRead) {
                checkmarks.style.color = '#4fc3f7'; // Telegram blue
                checkmarks.style.transition = 'color 0.3s ease';
            }
        }
    }
    
    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        
        if (!text || !roomRef) return;
        
        roomRef.push({
            type: 'message',
            username: username,
            text: text,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            read: false
        });
        
        input.value = '';
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function leaveRoom() {
        if (confirm('Keluar dari room?')) {
            if (roomRef) {
                roomRef.push({
                    type: 'system',
                    text: `${username} keluar`,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            }
            localStorage.removeItem('chat_username');
            localStorage.removeItem('chat_room');
            location.reload();
        }
    }
    
    // Event Listeners
    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    // Auto join if exists
    window.onload = () => {
        const savedName = localStorage.getItem('chat_username');
        const savedRoom = localStorage.getItem('chat_room');
        if (savedName && savedRoom) {
            username = savedName;
            currentRoom = savedRoom;
            document.getElementById('username').value = savedName;
            document.getElementById('room-input').value = savedRoom;
            joinRoom();
        }
    };
</script>

</body>
</html>
